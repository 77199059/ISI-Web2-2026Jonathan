<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajo en clase</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="page-shell">
        <section class="hero-card">
            <div class="hero-copy">
                <p class="eyebrow">Administración de equipos</p>
                <h1>Trabajo en la clase</h1>
                <p class="subtitle">Conexión de eliminar y listado de equipos.</p>
            </div>

            <form class="delete-panel">
                <label for="teamId">ID del equipo para obtener</label>
                <div class="delete-controls">
                    <input type="text" id="teamId" name="teamId" placeholder="Escribe el ID">
                    <button id="deleteTeamButton" type="button">Obtener equipo</button>
                </div>
            </form>
        </section>

       <section id="teams-container" class="table-card" aria-label="Listado de equipos">
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>id</th>
                    <th>name</th>
                    <th>description</th>
                    <th>membersCount</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="teams-table-body">
                <!-- Las filas de equipos se insertarán aquí dinámicamente con JavaScript -->
                </tbody>
        </table>
    </div>
</section>
    </main>
    <script type="module" src="get.js"></script>
</body>
</html>
